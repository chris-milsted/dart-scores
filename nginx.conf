# Dart Tracker — nginx configuration
# Serves static files on port 8080 (mapped to host port 80 via Podman).
# All OWASP A05 security headers are applied here at the server level.

# Shared CSP string — declared once for consistency
# (nginx has no variables in add_header, so it is repeated per location block)
map $uri $csp_value {
    default "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security: suppress server version banner (OWASP A05) ──────────────
    server_tokens off;

    # ── Disable directory listing (OWASP A05) ─────────────────────────────
    autoindex off;

    # ── HTML pages — no caching + full security headers ────────────────────
    location ~* \.html$ {
        limit_except GET HEAD { deny all; }

        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
            always;
        add_header X-Frame-Options        "DENY"       always;
        add_header X-Content-Type-Options "nosniff"    always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Permissions-Policy
            "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
            always;
        add_header X-XSS-Protection "0" always;
    }

    # ── JS / CSS assets — cacheable + security headers ─────────────────────
    location ~* \.(js|css)$ {
        limit_except GET HEAD { deny all; }

        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
            always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Default location — all other requests (404 → index.html) ──────────
    location / {
        limit_except GET HEAD { deny all; }

        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
            always;
        add_header X-Frame-Options        "DENY"       always;
        add_header X-Content-Type-Options "nosniff"    always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Permissions-Policy
            "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
            always;
        add_header X-XSS-Protection "0" always;
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 404 /index.html;

    # ── Access and error logging (OWASP A09) ──────────────────────────────
    access_log /var/log/nginx/dart-tracker-access.log;
    error_log  /var/log/nginx/dart-tracker-error.log warn;
}
